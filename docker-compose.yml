services:
  postgres:
    image: postgres:16
    container_name: oracle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oracle
      POSTGRES_PASSWORD: oracle_dev_password
      POSTGRES_DB: oracle_omega
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oracle -d oracle_omega"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: oracle-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  postgres_data:
  chroma_data:
